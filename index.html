<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f05d42">
    <meta
      name="description"
      content="A tiny seeded browser game about rebuilding scrambled museum timelines."
    >
    <title>Time Heist Shuffle</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f3f6f0'/%3E%3Cpath d='M18 17h28v30H18zM24 25h16M24 33h16M24 41h10' fill='none' stroke='%23f05d42' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="src/styles.css?v=time-heist-20260603">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Game status">
        <div>
          <p class="eyebrow" id="seedLabel">Daily case file</p>
          <h1>Time Heist Shuffle</h1>
        </div>
        <div class="score-strip" aria-live="polite">
          <span id="caseProgress">Case 1 / 3</span>
          <strong id="scoreTotal">0 pts</strong>
        </div>
      </section>

      <section class="game-layout" aria-label="Game board">
        <aside class="case-panel">
          <p class="eyebrow">Museum notes</p>
          <h2 id="caseTitle"></h2>
          <p id="caseBrief"></p>
          <ol id="clueList" class="clue-list"></ol>
          <div class="challenge-card" aria-label="Replay challenge">
            <p class="eyebrow">Replay challenge</p>
            <code id="challengeLink"></code>
            <button id="copyLinkButton" class="ghost-button" type="button">Copy challenge link</button>
          </div>
          <div class="result-panel" id="resultPanel" aria-live="polite"></div>
        </aside>

        <section class="timeline-panel">
          <div class="timeline-head">
            <span>Earliest</span>
            <span>Latest</span>
          </div>
          <ol id="timeline" class="timeline" aria-label="Scrambled artifact timeline"></ol>
          <div class="actions">
            <button id="lockButton" class="primary-button" type="button">Lock timeline</button>
            <button id="resetButton" class="ghost-button" type="button">Reshuffle case</button>
          </div>
          <p id="controlHint" class="control-hint" aria-live="polite"></p>
        </section>
      </section>

      <section class="summary" id="summary" hidden>
        <p class="eyebrow">Case closed</p>
        <h2 id="summaryTitle"></h2>
        <p id="summaryText"></p>
        <textarea id="shareText" readonly rows="4"></textarea>
        <div class="actions">
          <button id="copyButton" class="primary-button" type="button">Copy result</button>
          <button id="restartButton" class="ghost-button" type="button">Play again</button>
        </div>
      </section>
    </main>

    <script type="module" src="src/app.js?v=time-heist-20260603"></script>
  </body>
</html>
